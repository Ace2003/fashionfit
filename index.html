    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>时尚穿搭指南</h1>
        <p>根据性别、年龄、场合，打造专属于你的完美形象</p>
    </header>

    <!-- 筛选器区域 -->
    <section class="filters-section">
        <div class="filter-group">
            <label class="filter-label">👤 性别</label>
            <div class="filter-buttons">
                <button class="filter-btn gender-btn active" data-gender="female">女生</button>
                <button class="filter-btn gender-btn" data-gender="male">男生</button>
            </div>
        </div>

        <div class="filter-group">
            <label class="filter-label">🎂 年龄段</label>
            <div class="filter-buttons">
                <button class="filter-btn age-btn" data-age="teen">青少年 (13-17岁)</button>
                <button class="filter-btn age-btn active" data-age="young">青年 (18-30岁)</button>
                <button class="filter-btn age-btn" data-age="adult">中年 (31-50岁)</button>
                <button class="filter-btn age-btn" data-age="senior">成熟 (50岁+)</button>
            </div>
        </div>

        <div class="filter-group">
            <label class="filter-label">📍 场景</label>
            <div class="filter-buttons scene-buttons">
                <button class="filter-btn scene-btn active" data-scene="daily">日常穿搭</button>
                <button class="filter-btn scene-btn" data-scene="business">商务穿搭</button>
                <button class="filter-btn scene-btn" data-scene="date">约会穿搭</button>
                <button class="filter-btn scene-btn" data-scene="party">派对穿搭</button>
                <button class="filter-btn scene-btn" data-scene="play">玩耍穿搭</button>
                <button class="filter-btn scene-btn" data-scene="game">游戏穿搭</button>
            </div>
        </div>
    </section>

    <!-- 穿搭方案选择区域 -->
    <section class="outfit-options-section">
        <h3 class="options-title">选择穿搭方案</h3>
        <div class="outfit-options" id="outfitOptions">
            <!-- 由JavaScript动态生成 -->
        </div>
    </section>

    <main>
        <!-- 穿搭展示区域 -->
        <section id="outfitDisplay" class="outfit-display">
            <div class="scene-header">
                <h2 id="currentSceneTitle">日常穿搭</h2>
                <p class="scene-desc" id="currentSceneDesc">舒适自在，轻松应对日常生活</p>
                <div class="current-filters" id="currentFilters">
                    <span class="filter-tag">👤 女生</span>
                    <span class="filter-tag">🎂 青年 (18-30岁)</span>
                    <span class="filter-tag">方案 A</span>
                </div>
            </div>
            
            <div class="outfit-grid" id="outfitGrid">
                <!-- 由JavaScript动态生成 -->
            </div>
        </section>
    </main>
